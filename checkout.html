<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CoreTech Checkout | Secure Payment</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0c0c0c; color: white; }
        .input-field { background: #1a1a1a; border: 1px solid #333; transition: all 0.3s; }
        .input-field:focus { border-color: #facc15; outline: none; box-shadow: 0 0 10px rgba(250,204,21,0.2); }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">

    <div class="w-full max-w-4xl grid grid-cols-1 md:grid-cols-2 bg-[#111] rounded-3xl overflow-hidden shadow-2xl border border-zinc-800">
        
        <div class="p-10 bg-[#161616] border-r border-zinc-800">
            <h1 class="text-yellow-400 font-black uppercase tracking-widest text-sm mb-8">CoreTech Solutions</h1>
            <h2 class="text-3xl font-bold mb-6">Tu Pedido</h2>
            <div id="order-list" class="space-y-4 mb-8">
                </div>
            <div class="border-t border-zinc-800 pt-6 flex justify-between items-center">
                <span class="text-zinc-500 uppercase font-bold text-xs">Total a pagar</span>
                <span id="final-total" class="text-4xl font-black text-yellow-400">$0.00</span>
            </div>
        </div>

        <div class="p-10">
            <h3 class="text-xl font-bold mb-6">Método de Pago</h3>
            
            <div class="flex gap-4 mb-8">
                <div class="flex-1 p-4 border-2 border-yellow-400 rounded-xl bg-yellow-400/5 text-center cursor-pointer">
                    <span class="block text-xs font-bold uppercase text-yellow-400">Tarjeta</span>
                </div>
                <div class="flex-1 p-4 border border-zinc-800 rounded-xl text-zinc-500 text-center cursor-not-allowed opacity-50">
                    <span class="block text-xs font-bold uppercase">PayPal</span>
                </div>
            </div>

            <form id="payment-form" class="space-y-4">
                <div>
                    <label class="block text-xs font-bold text-zinc-500 uppercase mb-2">Nombre en la tarjeta</label>
                    <input type="text" placeholder="EJ: EDUARDO BARBOSA" class="input-field w-full p-4 rounded-xl text-white uppercase" required>
                </div>
                <div>
                    <label class="block text-xs font-bold text-zinc-500 uppercase mb-2">Número de tarjeta</label>
                    <input type="text" placeholder="**** **** **** ****" class="input-field w-full p-4 rounded-xl text-white" required>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <input type="text" placeholder="MM / YY" class="input-field w-full p-4 rounded-xl text-white" required>
                    <input type="text" placeholder="CVC" class="input-field w-full p-4 rounded-xl text-white" required>
                </div>
                <button type="submit" class="w-full bg-yellow-400 text-black py-5 rounded-2xl font-black uppercase tracking-tighter hover:bg-yellow-500 transition mt-6">
                    Pagar Ahora
                </button>
            </form>
            <p class="text-[10px] text-center text-zinc-600 mt-6 uppercase tracking-widest">Pago encriptado y seguro por CoreTech Secure</p>
        </div>
    </div>

    <script>
        // Cargar datos del localStorage
        const cart = JSON.parse(localStorage.getItem('coretech_cart')) || [];
        const total = localStorage.getItem('coretech_total') || "$0.00";

        const orderList = document.getElementById('order-list');
        cart.forEach(item => {
            orderList.innerHTML += `
                <div class="flex justify-between items-center">
                    <span class="text-zinc-300 font-medium">${item.name}</span>
                    <span class="text-white font-bold">$${item.price.toFixed(2)}</span>
                </div>
            `;
        });
        document.getElementById('final-total').innerText = total;

        // Simular Pago
        document.getElementById('payment-form').onsubmit = (e) => {
            e.preventDefault();
            alert("¡Pago Procesado con Éxito! Recibirás un correo de confirmación.");
            localStorage.removeItem('coretech_cart');
            window.close(); // Cerrar pestaña al terminar
        };
    </script>
</body>
</html>
